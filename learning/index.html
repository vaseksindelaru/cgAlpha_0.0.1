<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGAlpha/dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .dashboard-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #16213e;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .dashboard-header h1 {
            color: #00d4aa;
            font-size: 1.8rem;
        }

        .dashboard-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 40px;
            margin-top: 80px;
        }

        .dashboard-btn {
            background: #16213e;
            color: #fff;
            border: 2px solid #00d4aa;
            border-radius: 15px;
            padding: 40px 60px;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 280px;
        }

        .dashboard-btn:hover {
            background: #00d4aa;
            color: #000;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 212, 170, 0.3);
        }

        .dashboard-btn .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .dashboard-btn .label {
            font-weight: bold;
        }

        .dashboard-btn .description {
            font-size: 0.9rem;
            margin-top: 10px;
            opacity: 0.8;
        }

        /* ============================================================
           AGENTE ASISTENTE FLOTANTE
           ============================================================ */
        #ai-assistant {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: 370px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(0, 212, 170, 0.18);
            z-index: 2000;
            transition: width 0.3s, box-shadow 0.3s;
            background: #0f1b2d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #ai-assistant.collapsed {
            width: 62px;
            border-radius: 50px;
        }

        #ai-assistant.fullscreen {
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            max-width: none;
            border-radius: 0;
            z-index: 3000;
        }

        .ai-header {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            background: linear-gradient(135deg, #00c897 0%, #00aef0 100%);
            cursor: pointer;
            user-select: none;
            gap: 10px;
            min-height: 52px;
        }

        #ai-assistant.fullscreen .ai-header {
            border-radius: 0;
        }

        .ai-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            position: relative;
        }

        .ai-avatar::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            border: 2px solid #0f1b2d;
        }

        .ai-header-text {
            overflow: hidden;
            transition: opacity 0.2s, max-width 0.3s;
        }

        #ai-assistant.collapsed .ai-header-text {
            opacity: 0;
            max-width: 0;
        }

        .ai-header-title {
            font-weight: 700;
            font-size: 13px;
            color: #fff;
            white-space: nowrap;
        }

        .ai-header-sub {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            white-space: nowrap;
        }

        .ai-toggle-btn {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 13px;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .ai-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        #ai-assistant.collapsed .ai-toggle-btn {
            margin-left: 0;
        }

        .ai-fullscreen-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 13px;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .ai-fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        .ai-body {
            display: flex;
            flex-direction: column;
            height: 400px;
            background: #0f1b2d;
        }

        #ai-assistant.fullscreen .ai-body {
            height: calc(100dvh - 52px);
        }

        #ai-assistant.fullscreen .ai-conversation-layout {
            height: 100%;
            min-height: 0;
        }

        #ai-assistant.fullscreen .ai-history-sidebar,
        #ai-assistant.fullscreen .ai-chat-panel,
        #ai-assistant.fullscreen .ai-messages {
            min-height: 0;
        }

        #ai-assistant.collapsed .ai-body {
            display: none;
        }

        /* API key bar */
        .ai-apikey-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .ai-apikey-bar input {
            flex: 1;
            background: #162030;
            border: 1px solid rgba(0, 212, 170, 0.25);
            border-radius: 8px;
            padding: 5px 9px;
            color: #ccc;
            font-size: 11px;
            outline: none;
        }

        .ai-apikey-bar input:focus {
            border-color: #00d4aa;
        }

        .ai-apikey-bar button {
            background: #00d4aa22;
            border: 1px solid #00d4aa55;
            border-radius: 8px;
            color: #00d4aa;
            font-size: 11px;
            padding: 5px 10px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .ai-apikey-bar button:hover {
            background: #00d4aa44;
        }

        .ai-key-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .ai-key-wrapper input {
            width: 100%;
            padding-right: 30px;
        }

        .ai-eye-btn {
            position: absolute;
            right: 6px;
            background: none !important;
            border: none !important;
            padding: 0 !important;
            color: #00d4aa88 !important;
            font-size: 13px !important;
            cursor: pointer;
            line-height: 1;
        }

        .ai-eye-btn:hover {
            color: #00d4aa !important;
            background: none !important;
        }

        /* Context chips */
        .ai-context-bar {
            display: flex;
            gap: 6px;
            padding: 6px 12px;
            overflow-x: auto;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            scrollbar-width: none;
        }

        .ai-context-bar::-webkit-scrollbar {
            display: none;
        }

        .ai-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #162030;
            border: 1px solid rgba(0, 212, 170, 0.2);
            border-radius: 999px;
            padding: 3px 10px;
            font-size: 10px;
            color: #00d4aa;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .ai-conversation-layout {
            flex: 1;
            min-height: 0;
            display: flex;
        }

        .ai-history-sidebar {
            display: none;
            width: 260px;
            min-width: 260px;
            background: #0b1626;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            overflow-y: scroll;
            padding: 10px;
            scrollbar-gutter: stable;
            scrollbar-width: thin;
            scrollbar-color: #00d4aa66 #0b1626;
        }

        .ai-history-sidebar::-webkit-scrollbar {
            width: 12px;
            -webkit-appearance: none;
        }

        .ai-history-sidebar::-webkit-scrollbar-thumb {
            background: #00d4aa66;
            border-radius: 8px;
            border: 2px solid #0b1626;
            min-height: 32px;
        }

        .ai-history-sidebar::-webkit-scrollbar-track {
            background: #0b1626;
        }

        #ai-assistant.fullscreen .ai-history-sidebar {
            display: block;
        }

        .ai-history-title {
            color: #9adbc8;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2px;
            margin-bottom: 8px;
            position: sticky;
            top: 0;
            background: #0b1626;
            padding-bottom: 6px;
        }

        .ai-history-toolbar {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            position: sticky;
            top: 24px;
            background: #0b1626;
            padding-bottom: 6px;
            z-index: 1;
        }

        .ai-history-new-btn {
            flex: 1;
            border: 1px solid rgba(0, 212, 170, 0.35);
            background: #10253b;
            color: #9df1dc;
            border-radius: 8px;
            font-size: 11px;
            padding: 7px 8px;
            cursor: pointer;
        }

        .ai-history-new-btn:hover {
            background: #14314d;
        }

        .ai-history-conv-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 3px;
        }

        .ai-history-conv-actions {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .ai-history-conv-action {
            border: 1px solid rgba(0, 212, 170, 0.28);
            background: #162a41;
            color: #9df1dc;
            border-radius: 6px;
            font-size: 10px;
            line-height: 1;
            padding: 5px 6px;
            cursor: pointer;
            min-width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .ai-history-conv-action:hover {
            background: #1b3552;
            border-color: rgba(0, 212, 170, 0.45);
        }

        .ai-history-conv-action.danger {
            border-color: rgba(255, 107, 107, 0.35);
            background: #3a1f22;
            color: #ffc5c5;
        }

        .ai-history-conv-action.danger:hover {
            border-color: rgba(255, 107, 107, 0.55);
            background: #4a2529;
        }

        .ai-history-conv-title {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 3px;
            color: #e6f8ff;
        }

        .ai-history-meta {
            font-size: 10px;
            opacity: 0.75;
            margin-bottom: 2px;
        }

        .ai-history-item.active {
            border-color: rgba(0, 212, 170, 0.7);
            box-shadow: 0 0 0 1px rgba(0, 212, 170, 0.35) inset;
            background: #1a3451;
        }

        .ai-history-item {
            display: block;
            width: 100%;
            text-align: left;
            background: #122137;
            color: #cfe8ff;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            padding: 7px 8px;
            font-size: 11px;
            line-height: 1.35;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .ai-history-item:hover {
            border-color: rgba(0, 212, 170, 0.35);
            background: #172841;
        }

        .ai-history-role {
            font-size: 10px;
            opacity: 0.8;
            margin-bottom: 2px;
        }

        .ai-chat-panel {
            flex: 1;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        /* Messages area */
        .ai-messages {
            flex: 1;
            overflow-y: scroll;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scrollbar-gutter: stable;
            scrollbar-width: thin;
            scrollbar-color: #00d4aa22 transparent;
        }

        .ai-messages::-webkit-scrollbar {
            width: 8px;
            -webkit-appearance: none;
        }

        .ai-messages::-webkit-scrollbar-thumb {
            background: #00d4aa66;
            border-radius: 4px;
            border: 2px solid #0f1b2d;
            min-height: 32px;
        }

        .ai-messages::-webkit-scrollbar-track {
            background: #0f1b2d;
        }

        .ai-msg {
            max-width: 90%;
            padding: 9px 13px;
            border-radius: 12px;
            font-size: 12.5px;
            line-height: 1.5;
            word-break: break-word;
        }

        .ai-msg.assistant {
            background: linear-gradient(135deg, #162030 0%, #1a2a40 100%);
            border: 1px solid rgba(0, 212, 170, 0.15);
            border-bottom-left-radius: 4px;
            color: #d0e8f8;
            align-self: flex-start;
        }

        .ai-msg.user {
            background: linear-gradient(135deg, #00c89722 0%, #00aef022 100%);
            border: 1px solid rgba(0, 212, 170, 0.25);
            border-bottom-right-radius: 4px;
            color: #e2f8f0;
            align-self: flex-end;
            text-align: right;
        }

        .ai-msg.system-hint {
            background: rgba(0, 212, 170, 0.06);
            border: 1px dashed rgba(0, 212, 170, 0.25);
            border-radius: 8px;
            color: #7dd3b0;
            font-size: 11px;
            align-self: center;
            text-align: center;
            padding: 6px 12px;
        }

        .ai-typing {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 8px 12px;
            align-self: flex-start;
        }

        .ai-typing span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #00d4aa;
            animation: aiTyping 1.2s infinite;
        }

        .ai-typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .ai-typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes aiTyping {
            0%, 80%, 100% {
                opacity: 0.25;
                transform: scale(1);
            }
            40% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        /* Quick suggestions */
        .ai-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 4px 12px 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ai-sugg-btn {
            background: #162030;
            border: 1px solid rgba(0, 212, 170, 0.2);
            border-radius: 999px;
            color: #00d4aa;
            font-size: 10.5px;
            padding: 4px 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .ai-sugg-btn:hover {
            background: rgba(0, 212, 170, 0.12);
        }

        /* Input */
        .ai-input-row {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        #ai-input {
            flex: 1;
            background: #162030;
            border: 1px solid rgba(0, 212, 170, 0.25);
            border-radius: 10px;
            padding: 8px 12px;
            color: #fff;
            font-size: 12.5px;
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 80px;
            overflow-y: auto;
        }

        #ai-input:focus {
            border-color: #00d4aa;
        }

        #ai-send-btn {
            background: linear-gradient(135deg, #00c897, #00aef0);
            border: none;
            border-radius: 10px;
            color: #fff;
            width: 38px;
            height: 38px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s;
            align-self: flex-end;
        }

        #ai-send-btn:hover {
            opacity: 0.85;
        }

        #ai-send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .dashboard-container {
                flex-direction: column;
            }

            #ai-assistant {
                width: calc(100vw - 32px);
                left: 16px;
                bottom: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard-header">
        <h1>CGAlpha/dashboard</h1>
    </div>

    <div class="dashboard-container">
        <a href="library.html" class="dashboard-btn">
            <span class="icon">📚</span>
            <span class="label">Library</span>
            <span class="description">Biblioteca de contenido</span>
        </a>

        <a href="learning.html" class="dashboard-btn">
            <span class="icon">🎓</span>
            <span class="label">Learning</span>
            <span class="description">Sistema de aprendizaje</span>
        </a>
    </div>

    <!-- ===== AGENTE ASISTENTE FLOTANTE ===== -->
    <div id="ai-assistant">
        <div class="ai-header" onclick="aiToggleCollapse()" title="Haz clic para minimizar/expandir">
            <div class="ai-avatar">🤖</div>
            <div class="ai-header-text">
                <div class="ai-header-title">Asistente CGAlpha</div>
                <div class="ai-header-sub">Pregúntame cualquier cosa</div>
            </div>
            <button class="ai-fullscreen-btn" id="ai-fullscreen-btn" onclick="event.stopPropagation(); aiToggleFullscreen()" title="Pantalla completa">⛶</button>
            <button class="ai-toggle-btn" id="ai-collapse-btn" onclick="event.stopPropagation(); aiToggleCollapse()" title="Minimizar">▼</button>
        </div>
        <div class="ai-body">
            <div class="ai-apikey-bar">
                <div class="ai-key-wrapper">
                    <input type="password" id="ai-apikey-input" placeholder="Gemini API Key (opcional)" autocomplete="off">
                    <button class="ai-eye-btn" id="ai-eye-btn" onclick="aiToggleKeyVisibility()" title="Mostrar/ocultar API Key">👁</button>
                </div>
                <button onclick="aiSaveKey()">💾</button>
            </div>
            <div class="ai-context-bar" id="ai-context-bar">
                <span class="ai-chip">🏠 Dashboard</span>
            </div>
            <div class="ai-conversation-layout">
                <aside class="ai-history-sidebar" id="ai-history-sidebar"></aside>
                <div class="ai-chat-panel">
                    <div class="ai-messages" id="ai-messages"></div>
                    <div class="ai-suggestions" id="ai-suggestions">
                        <button class="ai-sugg-btn" onclick="aiQuick('Ir a Library')">📚 Ir a Library</button>
                        <button class="ai-sugg-btn" onclick="aiQuick('Ir a Learning')">🎓 Ir a Learning</button>
                        <button class="ai-sugg-btn" onclick="aiQuick('Explícame el sistema CGAlpha')">💡 ¿Qué es CGAlpha?</button>
                        <button class="ai-sugg-btn" onclick="aiQuick('¿Qué puedo hacer aquí?')">❓ ¿Ayuda?</button>
                    </div>
                    <div class="ai-input-row">
                        <textarea id="ai-input" rows="1" placeholder="Pregúntame sobre CGAlpha…" onkeydown="aiKeyDown(event)"></textarea>
                        <button id="ai-send-btn" onclick="aiSend()" title="Enviar">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ============================================================
           AGENTE ASISTENTE – Lógica completa
           ============================================================ */
        const AI_STORAGE_KEY = 'cgalpha_ai_v2';
        const AI_MODEL = 'gemini-3-flash-preview';
        let aiState = {
            collapsed: false,
            fullscreen: false,
            apiKey: '',
            activeConversationId: null,
            showMessageListInSidebar: false,
            conversations: [],
            history: [],
        };

        function aiMakeConversationId() {
            return `conv_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
        }

        function aiBuildConversationTitle(seedText) {
            const raw = String(seedText || '').replace(/\s+/g, ' ').trim();
            if (!raw) return 'Nueva conversación';
            return raw.slice(0, 38) + (raw.length > 38 ? '…' : '');
        }

        function aiGetActiveConversation() {
            return aiState.conversations.find((c) => c.id === aiState.activeConversationId) || null;
        }

        function aiEnsureConversations() {
            if (!Array.isArray(aiState.conversations)) aiState.conversations = [];
            if (aiState.conversations.length === 0) {
                aiState.conversations = [{
                    id: aiMakeConversationId(),
                    title: aiState.history.length > 0 ? aiBuildConversationTitle(aiState.history[0]?.text || '') : 'Nueva conversación',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    history: Array.isArray(aiState.history) ? aiState.history.slice() : [],
                }];
            }
            if (!aiState.activeConversationId || !aiState.conversations.some((c) => c.id === aiState.activeConversationId)) {
                aiState.activeConversationId = aiState.conversations[0].id;
            }
            const active = aiGetActiveConversation();
            aiState.history = active ? (active.history || []) : [];
        }

        function aiPersistActiveHistory() {
            const active = aiGetActiveConversation();
            if (!active) return;
            active.history = aiState.history.slice();
            active.updatedAt = new Date().toISOString();
            if (!active.title || active.title === 'Nueva conversación') {
                const firstUserMsg = aiState.history.find((m) => m.role === 'user')?.text || '';
                if (firstUserMsg) active.title = aiBuildConversationTitle(firstUserMsg);
            }
        }

        function aiCreateNewConversation() {
            const conv = {
                id: aiMakeConversationId(),
                title: 'Nueva conversación',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
                history: [],
            };
            aiState.conversations.unshift(conv);
            aiState.activeConversationId = conv.id;
            aiState.history = [];
            aiSave();
            aiRenderMessages();
            aiUpdateContext();
        }

        function aiSwitchConversation(conversationId) {
            const target = aiState.conversations.find((c) => c.id === conversationId);
            if (!target) return;
            aiPersistActiveHistory();
            aiState.activeConversationId = conversationId;
            aiState.history = (target.history || []).slice();
            aiSave();
            aiRenderMessages();
            aiUpdateContext();
        }

        function aiDeleteConversation(conversationId) {
            aiEnsureConversations();
            const target = aiState.conversations.find((c) => c.id === conversationId);
            if (!target) return;
            const ok = confirm(`¿Eliminar conversación "${target.title || 'Nueva conversación'}"?`);
            if (!ok) return;
            aiState.conversations = aiState.conversations.filter((c) => c.id !== target.id);
            if (aiState.conversations.length === 0) {
                aiState.conversations = [{
                    id: aiMakeConversationId(),
                    title: 'Nueva conversación',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    history: [],
                }];
            }
            if (aiState.activeConversationId === target.id) {
                aiState.activeConversationId = aiState.conversations[0].id;
                aiState.history = (aiState.conversations[0].history || []).slice();
            }
            aiSave();
            aiRenderMessages();
            aiUpdateContext();
            showNotification('Conversación eliminada.');
        }

        function aiLoad() {
            try {
                const raw = localStorage.getItem(AI_STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    aiState = { ...aiState, ...parsed };
                }
            } catch (_) { }
            aiEnsureConversations();
        }

        function aiSave() {
            aiPersistActiveHistory();
            localStorage.setItem(AI_STORAGE_KEY, JSON.stringify({
                collapsed: aiState.collapsed,
                fullscreen: aiState.fullscreen,
                showMessageListInSidebar: aiState.showMessageListInSidebar,
                apiKey: aiState.apiKey,
                activeConversationId: aiState.activeConversationId,
                conversations: aiState.conversations
                    .map((c) => ({
                        ...c,
                        history: (c.history || []).slice(-120),
                    }))
                    .slice(0, 40),
                history: aiState.history.slice(-40),
            }));
        }

        function aiToggleFullscreen(forceValue) {
            const el = document.getElementById('ai-assistant');
            const btn = document.getElementById('ai-fullscreen-btn');
            const bodyEl = document.body;
            if (!el) return;
            const nextValue = typeof forceValue === 'boolean' ? forceValue : !aiState.fullscreen;
            aiState.fullscreen = nextValue;
            if (aiState.fullscreen) {
                el.classList.add('fullscreen');
                if (bodyEl) bodyEl.classList.add('ai-fullscreen-active');
                aiState.collapsed = false;
                el.classList.remove('collapsed');
                const collapseBtn = document.getElementById('ai-collapse-btn');
                if (collapseBtn) collapseBtn.textContent = '▼';
            } else {
                el.classList.remove('fullscreen');
                if (bodyEl) bodyEl.classList.remove('ai-fullscreen-active');
            }
            if (btn) {
                btn.textContent = aiState.fullscreen ? '🗗' : '⛶';
                btn.title = aiState.fullscreen ? 'Salir de pantalla completa' : 'Pantalla completa';
            }
            aiScrollToBottom();
            aiSave();
        }

        function aiToggleCollapse() {
            const el = document.getElementById('ai-assistant');
            const btn = document.getElementById('ai-collapse-btn');
            if (!el) return;
            aiState.collapsed = !aiState.collapsed;
            if (aiState.collapsed) {
                el.classList.add('collapsed');
                if (btn) { btn.textContent = '▲'; btn.title = 'Expandir'; }
            } else {
                el.classList.remove('collapsed');
                if (btn) { btn.textContent = '▼'; btn.title = 'Minimizar'; }
                if (aiState.fullscreen) {
                    aiToggleFullscreen(false);
                }
            }
            aiSave();
        }

        function aiToggleKeyVisibility() {
            const input = document.getElementById('ai-apikey-input');
            if (input) {
                input.type = input.type === 'password' ? 'text' : 'password';
            }
        }

        function aiSaveKey() {
            const input = document.getElementById('ai-apikey-input');
            if (input) {
                aiState.apiKey = input.value.trim();
                aiSave();
                showNotification('API Key guardada.');
            }
        }

        function aiUpdateContext() {
            const ctxBar = document.getElementById('ai-context-bar');
            if (ctxBar) {
                ctxBar.innerHTML = '<span class="ai-chip">🏠 Dashboard</span>';
            }
        }

        function aiRenderMessages() {
            const container = document.getElementById('ai-messages');
            if (!container) return;
            if (aiState.history.length === 0) {
                container.innerHTML = '<div class="ai-msg system-hint">👋 ¡Hola! Pregúntame sobre CGAlpha, la Library, el Learning, o lo que necesites.</div>';
                return;
            }
            container.innerHTML = aiState.history.map((m) => `<div class="ai-msg ${m.role}">${aiEscape(m.text)}</div>`).join('');
            aiScrollToBottom();
        }

        function aiScrollToBottom() {
            const container = document.getElementById('ai-messages');
            if (container) container.scrollTop = container.scrollHeight;
        }

        function aiEscape(str) {
            return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function aiQuick(text) {
            const input = document.getElementById('ai-input');
            if (input) input.value = text;
            aiSend();
        }

        function aiSend() {
            const input = document.getElementById('ai-input');
            const sendBtn = document.getElementById('ai-send-btn');
            const text = input?.value.trim();
            if (!text) return;
            aiState.history.push({ role: 'user', text });
            input.value = '';
            if (sendBtn) sendBtn.disabled = true;
            aiRenderMessages();
            const container = document.getElementById('ai-messages');
            if (container) {
                const typing = document.createElement('div');
                typing.className = 'ai-typing';
                typing.id = 'ai-typing';
                typing.innerHTML = '<span></span><span></span><span></span>';
                container.appendChild(typing);
                aiScrollToBottom();
            }
            setTimeout(() => aiCallAPI(text), 600);
        }

        async function aiCallAPI(userText) {
            const systemPrompt = `Eres el asistente de CGAlpha, un proyecto de aprendizaje de programación y trading algorítmico.Estás en el Dashboard, la página principal con enlaces a Library (biblioteca de contenido) y Learning (sistema de aprendizaje por hitos).Responde de forma útil, breve y en español.`;
            const key = aiState.apiKey || '';
            const messages = [{ role: 'user', parts: [{ text: systemPrompt + '\n\nUsuario: ' + userText }] }];
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${AI_MODEL}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: messages }),
                });
                const data = await res.json();
                const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || 'No pude obtener respuesta.';
                aiState.history.push({ role: 'assistant', text: reply });
            } catch (e) {
                aiState.history.push({ role: 'assistant', text: 'Error de conexión. Asegúrate de tener una API Key válida.' });
            }
            document.getElementById('ai-typing')?.remove();
            aiSave();
            aiRenderMessages();
            const sb = document.getElementById('ai-send-btn');
            if (sb) sb.disabled = false;
        }

        function aiKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                aiSend();
            }
        }

        function aiInit() {
            aiLoad();
            if (aiState.collapsed) {
                const el = document.getElementById('ai-assistant');
                const btn = document.getElementById('ai-collapse-btn');
                if (el) el.classList.add('collapsed');
                if (btn) btn.textContent = '▲';
            }
            if (aiState.fullscreen) {
                aiToggleFullscreen(true);
            }
            const keyInput = document.getElementById('ai-apikey-input');
            if (keyInput && aiState.apiKey) keyInput.value = aiState.apiKey;
            aiUpdateContext();
            aiRenderMessages();
        }

        document.getElementById('ai-input')?.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 80) + 'px';
        });

        function showNotification(msg) {
            const n = document.getElementById('notification');
            if (n) {
                n.textContent = msg;
                n.classList.add('show');
                setTimeout(() => n.classList.remove('show'), 3000);
            }
        }

        if (!document.getElementById('notification')) {
            const notif = document.createElement('div');
            notif.id = 'notification';
            notif.className = 'notification';
            document.body.appendChild(notif);
        }

        aiInit();
    </script>
</body>
</html>
